environment: production
id:
  kind: uuid
mapper:
  identifiers:
    req1: resp1
    req2: resp2
generator:
  applications:
    - name: uuid
      kind: uuid
    - name: uuid_alias
      kind: uuid
    - name: ksuid
      kind: ksuid
    - name: ulid
      kind: ulid
    - name: snowflake
      kind: snowflake
    - name: xid
      kind: xid
    - name: nanoid
      kind: nanoid
    - name: typeid
      kind: typeid
    - name: invalid_kind
      kind: invalid_kind
health:
  duration: 1s
  timeout: 1s
telemetry:
  logger:
    kind: text
    level: info
  metrics:
    kind: prometheus
transport:
  http:
    address: tcp://:11000
    limiter:
      kind: service-method
      tokens: 1000
      interval: 1s
    timeout: 5s
  grpc:
    address: tcp://:12000
    limiter:
      kind: service-method
      tokens: 1000
      interval: 1s
    timeout: 5s
