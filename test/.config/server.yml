environment: production
id:
  kind: uuid
limits:
  generate_count: 2
  map_ids: 2
mapper:
  applications:
    - name: uuid
      identifiers:
        req1: resp1
        req2: resp2
    - name: ulid
      identifiers:
        req1: ulid_resp1
generator:
  applications:
    - name: uuid
      kind: uuid
    - name: uuid_alias
      kind: uuid
    - name: ksuid
      kind: ksuid
    - name: ulid
      kind: ulid
    - name: snowflake
      kind: snowflake
    - name: xid
      kind: xid
    - name: nanoid
      kind: nanoid
    - name: typeid
      kind: typeid
    # Negative fixture: this application is intentionally configured with an
    # unresolved kind so API tests can assert NotFound behavior.
    - name: invalid_kind
      kind: invalid_kind
health:
  duration: 1s
  timeout: 1s
telemetry:
  logger:
    kind: text
    level: info
  metrics:
    kind: prometheus
transport:
  http:
    address: tcp://:11000
    limiter:
      kind: service-method
      tokens: 1000
      interval: 1s
    timeout: 5s
  grpc:
    address: tcp://:12000
    limiter:
      kind: service-method
      tokens: 1000
      interval: 1s
    timeout: 5s
