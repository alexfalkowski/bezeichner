environment: production
id:
  kind: uuid
mapper:
  identifiers:
    req1: resp1
generator:
  applications:
    -
health:
  duration: 1s
  timeout: 1s
telemetry:
  logger:
    kind: text
    level: info
  metrics:
    kind: prometheus
transport:
  http:
    address: tcp://:11103
    timeout: 5s
  grpc:
    address: tcp://:12103
    timeout: 5s
