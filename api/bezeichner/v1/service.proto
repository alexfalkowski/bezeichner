syntax = "proto3";

package bezeichner.v1;

option go_package = "github.com/alexfalkowski/bezeichner/api/bezeichner/v1";
option ruby_package = "Bezeichner::V1";

// GenerateIdentifiersRequest asks the service to generate identifiers for a
// configured application.
message GenerateIdentifiersRequest {
  // application is the configured generator application name.
  //
  // If the application is not configured, or if its configured kind cannot be
  // resolved, GenerateIdentifiers fails with NotFound.
  string application = 1;

  // count is the number of identifiers to generate.
  //
  // A zero value is valid when application resolves and returns an empty ids
  // list.
  //
  // The effective maximum is configured by service operators and defaults to
  // 1000. Larger requests fail with InvalidArgument.
  uint64 count = 2;
}

// GenerateIdentifiersResponse contains generated identifiers and service
// metadata.
message GenerateIdentifiersResponse {
  // meta contains service and transport metadata. It is reserved for
  // infrastructure metadata and is not business data.
  //
  // Bezeichner currently returns requestId and userAgent when the transport
  // can derive them from request metadata.
  map<string, string> meta = 1;

  // ids contains the generated identifiers.
  repeated string ids = 2;
}

// GeneratorApplication describes a configured generator application.
message GeneratorApplication {
  // name is the configured application name accepted by GenerateIdentifiers.
  string name = 1;

  // kind is the configured generator kind for the application.
  string kind = 2;
}

// MapperApplication describes a configured mapper application.
message MapperApplication {
  // name is the configured application name accepted by MapIdentifiers.
  string name = 1;
}

// RequestLimits contains effective per-request item-count limits.
message RequestLimits {
  // generate_count is the effective maximum GenerateIdentifiers count.
  uint64 generate_count = 1;

  // map_ids is the effective maximum MapIdentifiers ids length.
  uint64 map_ids = 2;
}

// ListApplicationsRequest asks the service to report configured application
// names and safe capability metadata.
message ListApplicationsRequest {}

// ListApplicationsResponse contains safe application discovery data.
message ListApplicationsResponse {
  // meta contains service and transport metadata. It is reserved for
  // infrastructure metadata and is not business data.
  //
  // Bezeichner currently returns requestId and userAgent when the transport
  // can derive them from request metadata.
  map<string, string> meta = 1;

  // generator_applications contains configured generator application names and
  // configured generator kinds in config order.
  repeated GeneratorApplication generator_applications = 2;

  // mapper_applications contains configured mapper application names in config
  // order. It does not expose mapper identifier entries.
  repeated MapperApplication mapper_applications = 3;

  // generator_kinds contains supported generator kinds in deterministic order.
  repeated string generator_kinds = 4;

  // limits contains effective per-request item-count limits.
  RequestLimits limits = 5;
}

// MapIdentifiersRequest asks the service to map identifiers for a configured
// application.
message MapIdentifiersRequest {
  // application is the configured mapper application name.
  //
  // If the application is not configured, MapIdentifiers fails with NotFound.
  string application = 1;

  // ids contains the identifiers to map.
  //
  // An empty list is valid when application mapping configuration is present
  // and returns an empty ids list. If mapper configuration is omitted, or if
  // the application is not configured, MapIdentifiers fails with NotFound
  // before mapping.
  //
  // The effective maximum list length is configured by service operators and
  // defaults to 1000. Larger requests fail with InvalidArgument.
  repeated string ids = 2;
}

// MappedIdentifier contains one mapping result for one request input.
message MappedIdentifier {
  // id is the original input identifier.
  string id = 1;

  // mapped is present when id was found in the configured mapping.
  optional string mapped = 2;
}

// MapIdentifiersResponse contains mapping results aligned to request order,
// plus service metadata.
message MapIdentifiersResponse {
  // meta contains service and transport metadata. It is reserved for
  // infrastructure metadata and is not business data.
  //
  // Bezeichner currently returns requestId and userAgent when the transport
  // can derive them from request metadata.
  map<string, string> meta = 1;

  // ids contains one result for each request input in the same order. Duplicate
  // request inputs produce duplicate response entries.
  repeated MappedIdentifier ids = 2;
}

// Service generates and maps identifiers.
service Service {
  // GenerateIdentifiers generates identifiers for a configured application.
  //
  // It returns InvalidArgument when count exceeds the configured limit, and
  // NotFound when the application or generator kind cannot be resolved.
  rpc GenerateIdentifiers(GenerateIdentifiersRequest) returns (GenerateIdentifiersResponse) {}

  // ListApplications reports configured application names and safe capability
  // metadata.
  //
  // It does not expose mapper identifier entries, raw config, transport
  // settings, telemetry settings, or resolved secret values.
  rpc ListApplications(ListApplicationsRequest) returns (ListApplicationsResponse) {}

  // MapIdentifiers maps identifiers through the configured application mapping.
  //
  // It returns InvalidArgument when more identifiers than the configured limit
  // are requested, and NotFound when mapper configuration is omitted or the
  // application is not configured.
  rpc MapIdentifiers(MapIdentifiersRequest) returns (MapIdentifiersResponse) {}
}
