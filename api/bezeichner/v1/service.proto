syntax = "proto3";

package bezeichner.v1;

option go_package = "github.com/alexfalkowski/bezeichner/api/bezeichner/v1";
option ruby_package = "Bezeichner::V1";

// GenerateIdentifiersRequest asks the service to generate identifiers for a
// configured application.
message GenerateIdentifiersRequest {
  // application is the configured generator application name.
  //
  // If the application is not configured, or if its configured kind cannot be
  // resolved, GenerateIdentifiers fails with NotFound.
  string application = 1;

  // count is the number of identifiers to generate.
  //
  // A zero value is valid when application resolves and returns an empty ids
  // list.
  //
  // The effective maximum is configured by service operators and defaults to
  // 1000. Larger requests fail with InvalidArgument.
  uint64 count = 2;
}

// GenerateIdentifiersResponse contains generated identifiers and service
// metadata.
message GenerateIdentifiersResponse {
  // meta contains service and transport metadata. It is reserved for
  // infrastructure metadata and is not business data.
  //
  // Bezeichner currently returns requestId and userAgent when the transport
  // can derive them from request metadata.
  map<string, string> meta = 1;

  // ids contains the generated identifiers.
  repeated string ids = 2;
}

// MapIdentifiersRequest asks the service to map identifiers for a configured
// application.
message MapIdentifiersRequest {
  // application is the configured mapper application name.
  //
  // If the application is not configured, MapIdentifiers fails with NotFound.
  string application = 1;

  // ids contains the identifiers to map.
  //
  // An empty list is valid when application mapping configuration is present
  // and returns an empty ids list. If mapper configuration is omitted, or if
  // the application is not configured, MapIdentifiers fails with NotFound
  // before mapping.
  //
  // The effective maximum list length is configured by service operators and
  // defaults to 1000. Larger requests fail with InvalidArgument.
  repeated string ids = 2;
}

// MapIdentifiersResponse contains mapped and unmapped identifiers, plus service
// metadata.
message MapIdentifiersResponse {
  // meta contains service and transport metadata. It is reserved for
  // infrastructure metadata and is not business data.
  //
  // Bezeichner currently returns requestId and userAgent when the transport
  // can derive them from request metadata.
  map<string, string> meta = 1;

  // mapped contains entries keyed by input identifier with values set to the
  // configured mapped identifier.
  map<string, string> mapped = 2;

  // unmapped contains input identifiers that could not be mapped.
  repeated string unmapped = 3;
}

// Service generates and maps identifiers.
service Service {
  // GenerateIdentifiers generates identifiers for a configured application.
  //
  // It returns InvalidArgument when count exceeds the configured limit, and
  // NotFound when the application or generator kind cannot be resolved.
  rpc GenerateIdentifiers(GenerateIdentifiersRequest) returns (GenerateIdentifiersResponse) {}

  // MapIdentifiers classifies identifiers through the configured application
  // mapping.
  //
  // It returns InvalidArgument when more identifiers than the configured limit
  // are requested, and NotFound when mapper configuration is omitted or the
  // application is not configured.
  rpc MapIdentifiers(MapIdentifiersRequest) returns (MapIdentifiersResponse) {}
}
